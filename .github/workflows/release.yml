name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles("**/pnpm-lock.yaml") }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create required stubs
        run: |
          mkdir -p src/canvas-host/a2ui
          [ -f src/canvas-host/a2ui/a2ui.bundle.js ] || echo "// stub" > src/canvas-host/a2ui/a2ui.bundle.js
          mkdir -p apps/shared/XClawKit/Sources/XClawKit/Resources
          [ -f apps/shared/XClawKit/Sources/XClawKit/Resources/tool-display.json ] || echo {} > apps/shared/XClawKit/Sources/XClawKit/Resources/tool-display.json

      - name: Build
        run: pnpm build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: XClaw ${{ steps.version.outputs.VERSION }}
          body: |
            ## XClaw ${{ steps.version.outputs.VERSION }}

            ### Kurulum
            ```bash
            curl -fsSL https://xclaw.amirtech.ai/install.sh | bash
            ```

            ### Değişiklikler
            Bu sürümdeki değişiklikler için commit geçmişine bakın.
          draft: false
          prerelease: false
