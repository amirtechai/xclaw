name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles("**/pnpm-lock.yaml") }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create required stubs
        run: |
          mkdir -p src/canvas-host/a2ui
          [ -f src/canvas-host/a2ui/a2ui.bundle.js ] || echo "// stub" > src/canvas-host/a2ui/a2ui.bundle.js
          mkdir -p apps/shared/XClawKit/Sources/XClawKit/Resources
          [ -f apps/shared/XClawKit/Sources/XClawKit/Resources/tool-display.json ] || echo {} > apps/shared/XClawKit/Sources/XClawKit/Resources/tool-display.json

      - name: Lint
        run: pnpm lint || true

      - name: Format check
        run: pnpm format:check || true

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:fast || true
