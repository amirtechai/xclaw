services:
  - type: web
    name: xclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: XCLAW_GATEWAY_PORT
        value: "8080"
      - key: XCLAW_STATE_DIR
        value: /data/.xclaw
      - key: XCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: XCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: xclaw-data
      mountPath: /data
      sizeGB: 1
